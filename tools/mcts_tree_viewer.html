<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MCTS Review Tree Viewer</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #1d2522;
      --muted: #66706b;
      --line: #d9ded6;
      --accent: #1f6f68;
      --accent-2: #b84e2f;
      --shadow: 0 14px 40px rgba(24, 35, 31, 0.12);
      --mono: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", Menlo, monospace;
      --sans: "Aptos", "Segoe UI", "Noto Sans", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(31, 111, 104, 0.10), transparent 34%),
        linear-gradient(315deg, rgba(184, 78, 47, 0.10), transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: var(--sans);
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    input[type="file"], select, button {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font: 13px var(--sans);
    }

    input[type="file"] { max-width: 300px; padding: 5px 8px; }
    select { min-width: 220px; padding: 0 8px; }
    button { padding: 0 12px; cursor: pointer; }
    button:hover { border-color: var(--accent); color: var(--accent); }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .workspace, .detail {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fafbf8;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .canvas-wrap {
      position: relative;
      overflow: auto;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
      background-color: #fbfcf7;
    }

    svg {
      display: block;
      min-width: 100%;
      min-height: 100%;
      cursor: grab;
    }

    svg.dragging { cursor: grabbing; }

    .edge {
      fill: none;
      stroke: #b7c0bb;
      stroke-width: 1.3;
    }

    .node-shape {
      stroke: #17201d;
      stroke-width: 1.2;
      filter: drop-shadow(0 3px 4px rgba(20, 30, 25, 0.12));
      cursor: pointer;
    }

    .node-shape.selected {
      stroke: #111;
      stroke-width: 3;
    }

    .node-label {
      pointer-events: none;
      fill: #17201d;
      font: 11px var(--mono);
      text-anchor: middle;
      dominant-baseline: central;
    }

    .node-meta {
      pointer-events: none;
      fill: #38423d;
      font: 10px var(--mono);
      text-anchor: middle;
    }

    .detail {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .detail-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcf8;
    }

    .detail-title {
      font-weight: 760;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .detail-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font: 12px var(--mono);
    }

    .detail-body {
      overflow: auto;
      padding: 14px;
    }

    .kv {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 6px 10px;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .kv .key { color: var(--muted); }
    .kv .value { font-family: var(--mono); overflow-wrap: anywhere; }

    details {
      border: 1px solid var(--line);
      border-radius: 7px;
      margin-bottom: 10px;
      background: #fff;
    }

    summary {
      cursor: pointer;
      padding: 10px 11px;
      color: var(--ink);
      font-weight: 680;
      font-size: 13px;
    }

    pre {
      margin: 0;
      padding: 0 11px 11px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 12px/1.5 var(--mono);
      color: #26302c;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 30px;
    }

    .legend {
      position: absolute;
      left: 12px;
      bottom: 12px;
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      color: var(--muted);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    @media (max-width: 920px) {
      header { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      main { grid-template-columns: 1fr; grid-template-rows: minmax(480px, 58vh) minmax(360px, 42vh); }
      .detail { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>MCTS Review Tree Viewer</h1>
        <div class="subtitle">加载 `mcts_samples/*.json` 或 aggregate `.jsonl`，点击节点查看完整思考、review 和 reward 细节。</div>
      </div>
      <div class="controls">
        <input id="fileInput" type="file" accept=".json,.jsonl,application/json">
        <select id="recordSelect" disabled></select>
        <button id="fitButton" type="button">适配视图</button>
      </div>
    </header>

    <main>
      <section class="workspace">
        <div id="stats" class="stats"></div>
        <div id="canvasWrap" class="canvas-wrap">
          <div id="emptyState" class="empty">选择一个 MCTS JSON 或 JSONL 文件开始查看。</div>
          <svg id="treeSvg" aria-label="MCTS tree" style="display:none"></svg>
          <div class="legend">
            <div class="legend-row"><span class="dot" style="background:#b42318"></span>低 q_value</div>
            <div class="legend-row"><span class="dot" style="background:#f2c94c"></span>中性</div>
            <div class="legend-row"><span class="dot" style="background:#1f8f66"></span>高 q_value</div>
            <div class="legend-row"><span class="dot" style="background:#222"></span>黑框为选中节点</div>
          </div>
        </div>
      </section>

      <aside class="detail">
        <div class="detail-head">
          <div id="detailTitle" class="detail-title">未选择节点</div>
          <div id="detailSubtitle" class="detail-subtitle">点击树中的节点查看详情</div>
        </div>
        <div id="detailBody" class="detail-body"></div>
      </aside>
    </main>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const recordSelect = document.getElementById("recordSelect");
    const fitButton = document.getElementById("fitButton");
    const statsEl = document.getElementById("stats");
    const svg = document.getElementById("treeSvg");
    const emptyState = document.getElementById("emptyState");
    const detailTitle = document.getElementById("detailTitle");
    const detailSubtitle = document.getElementById("detailSubtitle");
    const detailBody = document.getElementById("detailBody");

    let records = [];
    let currentRecord = null;
    let flatNodes = [];
    let selectedTag = null;
    let view = { x: 40, y: 40, scale: 1 };
    let drag = null;

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const text = await file.text();
      records = parseInput(text, file.name);
      populateRecordSelect(records);
      loadRecord(0);
    });

    recordSelect.addEventListener("change", () => loadRecord(Number(recordSelect.value)));
    fitButton.addEventListener("click", fitView);

    svg.addEventListener("wheel", (event) => {
      event.preventDefault();
      const factor = event.deltaY < 0 ? 1.1 : 0.9;
      const point = clientToSvg(event.clientX, event.clientY);
      view.x = point.x - (point.x - view.x) * factor;
      view.y = point.y - (point.y - view.y) * factor;
      view.scale = clamp(view.scale * factor, 0.25, 2.8);
      updateTransform();
    }, { passive: false });

    svg.addEventListener("pointerdown", (event) => {
      if (event.target.classList.contains("node-shape")) return;
      svg.classList.add("dragging");
      drag = { x: event.clientX, y: event.clientY, startX: view.x, startY: view.y };
      svg.setPointerCapture(event.pointerId);
    });

    svg.addEventListener("pointermove", (event) => {
      if (!drag) return;
      view.x = drag.startX + event.clientX - drag.x;
      view.y = drag.startY + event.clientY - drag.y;
      updateTransform();
    });

    svg.addEventListener("pointerup", () => {
      drag = null;
      svg.classList.remove("dragging");
    });

    function parseInput(text, name) {
      const trimmed = text.trim();
      if (!trimmed) return [];
      if (name.endsWith(".jsonl") || trimmed.includes("\n{")) {
        return trimmed.split(/\n+/).filter(Boolean).map((line, index) => ({ ...JSON.parse(line), __recordIndex: index }));
      }
      const parsed = JSON.parse(trimmed);
      if (Array.isArray(parsed)) return parsed.map((item, index) => ({ ...item, __recordIndex: index }));
      return [{ ...parsed, __recordIndex: 0 }];
    }

    function populateRecordSelect(items) {
      recordSelect.innerHTML = "";
      items.forEach((record, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = recordLabel(record, index);
        recordSelect.appendChild(option);
      });
      recordSelect.disabled = items.length <= 1;
    }

    function recordLabel(record, index) {
      const source = [record.source, record.subset].filter(Boolean).join("/");
      const id = record.dataset_index ?? record.__recordIndex ?? index;
      return `${index}: ${source || "record"} #${id}`;
    }

    function loadRecord(index) {
      currentRecord = records[index];
      selectedTag = null;
      if (!currentRecord || !currentRecord.react) {
        showEmpty("文件中没有 react 树。");
        return;
      }
      const root = buildTree(currentRecord.react);
      flatNodes = [];
      layoutTree(root);
      render(root);
      renderStats(currentRecord, flatNodes);
      renderRecordDetail(currentRecord);
      fitView();
    }

    function showEmpty(message) {
      svg.style.display = "none";
      emptyState.style.display = "grid";
      emptyState.textContent = message;
      statsEl.innerHTML = "";
    }

    function buildTree(react) {
      const nodes = Object.entries(react).map(([tag, data]) => ({
        tag,
        data,
        children: [],
        parent: null,
        depth: tag.split(".").length - 1,
      }));
      const byTag = new Map(nodes.map((node) => [node.tag, node]));
      const roots = [];
      for (const node of nodes) {
        const parentTag = node.tag.includes(".") ? node.tag.split(".").slice(0, -1).join(".") : null;
        const parent = parentTag ? byTag.get(parentTag) : null;
        if (parent) {
          node.parent = parent;
          parent.children.push(node);
        } else {
          roots.push(node);
        }
      }
      for (const node of nodes) {
        node.children.sort((a, b) => tagCompare(a.tag, b.tag));
      }
      if (roots.length === 1) return roots[0];
      return {
        tag: "__root__",
        data: { text: "synthetic root", q_value: 0, visit_count: 0 },
        children: roots.sort((a, b) => tagCompare(a.tag, b.tag)),
        parent: null,
        depth: -1,
        synthetic: true,
      };
    }

    function tagCompare(a, b) {
      const ap = a.split(".").map(Number);
      const bp = b.split(".").map(Number);
      for (let i = 0; i < Math.max(ap.length, bp.length); i += 1) {
        const av = Number.isFinite(ap[i]) ? ap[i] : -1;
        const bv = Number.isFinite(bp[i]) ? bp[i] : -1;
        if (av !== bv) return av - bv;
      }
      return a.localeCompare(b);
    }

    function layoutTree(root) {
      let row = 0;
      const xGap = 150;
      const yGap = 62;
      const walk = (node, depth) => {
        node.layoutDepth = depth;
        if (!node.children.length) {
          node.y = row * yGap;
          row += 1;
        } else {
          node.children.forEach((child) => walk(child, depth + 1));
          node.y = (node.children[0].y + node.children[node.children.length - 1].y) / 2;
        }
        node.x = depth * xGap;
        flatNodes.push(node);
      };
      walk(root, 0);
    }

    function render(root) {
      emptyState.style.display = "none";
      svg.style.display = "block";
      svg.innerHTML = "";

      const minY = Math.min(...flatNodes.map((node) => node.y));
      const maxY = Math.max(...flatNodes.map((node) => node.y));
      const maxX = Math.max(...flatNodes.map((node) => node.x));
      svg.setAttribute("viewBox", `0 0 ${Math.max(900, maxX + 260)} ${Math.max(620, maxY - minY + 180)}`);

      const viewport = document.createElementNS("http://www.w3.org/2000/svg", "g");
      viewport.id = "viewport";
      svg.appendChild(viewport);

      const edgeLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
      const nodeLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
      viewport.append(edgeLayer, nodeLayer);

      for (const node of flatNodes) {
        for (const child of node.children) {
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const x1 = node.x + 34;
          const y1 = node.y + 80;
          const x2 = child.x - 34;
          const y2 = child.y + 80;
          const mid = (x1 + x2) / 2;
          path.setAttribute("d", `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
          path.setAttribute("class", "edge");
          edgeLayer.appendChild(path);
        }
      }

      for (const node of flatNodes) {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("transform", `translate(${node.x},${node.y + 80})`);
        group.dataset.tag = node.tag;

        const finalGrade = parsedGrade(node);
        const isReview = Boolean(node.data.final_answer);
        const shape = document.createElementNS("http://www.w3.org/2000/svg", isReview ? "rect" : "circle");
        shape.setAttribute("class", "node-shape");
        shape.setAttribute("fill", colorForQ(Number(node.data.q_value ?? 0)));
        shape.dataset.tag = node.tag;
        if (isReview) {
          shape.setAttribute("x", "-24");
          shape.setAttribute("y", "-22");
          shape.setAttribute("width", "48");
          shape.setAttribute("height", "44");
          shape.setAttribute("rx", "7");
        } else {
          shape.setAttribute("r", node.synthetic ? "14" : "20");
        }
        shape.addEventListener("click", () => selectNode(node.tag));
        group.appendChild(shape);

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("class", "node-label");
        label.setAttribute("y", isReview ? "-1" : "0");
        label.textContent = isReview ? (finalGrade ?? "R") : shortTag(node.tag);
        group.appendChild(label);

        const meta = document.createElementNS("http://www.w3.org/2000/svg", "text");
        meta.setAttribute("class", "node-meta");
        meta.setAttribute("y", isReview ? "35" : "32");
        meta.textContent = qLabel(node.data.q_value);
        group.appendChild(meta);
        nodeLayer.appendChild(group);
      }
      updateTransform();
    }

    function selectNode(tag) {
      selectedTag = tag;
      svg.querySelectorAll(".node-shape").forEach((shape) => {
        shape.classList.toggle("selected", shape.dataset.tag === tag);
      });
      const node = flatNodes.find((item) => item.tag === tag);
      if (node) renderNodeDetail(node);
    }

    function renderStats(record, nodes) {
      const terminal = nodes.filter((node) => node.data.final_answer).length;
      const qValues = nodes.map((node) => Number(node.data.q_value)).filter(Number.isFinite);
      const minQ = qValues.length ? Math.min(...qValues) : 0;
      const maxQ = qValues.length ? Math.max(...qValues) : 0;
      const grades = nodes.map(parsedGrade).filter((grade) => grade !== null && grade !== undefined);
      statsEl.innerHTML = "";
      [
        `record: ${recordLabel(record, record.__recordIndex ?? 0)}`,
        `nodes: ${nodes.length}`,
        `reviews: ${terminal}`,
        `q: ${minQ.toFixed(2)} .. ${maxQ.toFixed(2)}`,
        `target AXIOM: ${record.axiom_target_grade ?? "n/a"}`,
        `review grades: ${gradeSummary(grades)}`,
      ].forEach((text) => {
        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = text;
        statsEl.appendChild(pill);
      });
    }

    function gradeSummary(grades) {
      if (!grades.length) return "n/a";
      const counts = new Map();
      grades.forEach((grade) => counts.set(grade, (counts.get(grade) || 0) + 1));
      return [...counts.entries()].sort((a, b) => a[0] - b[0]).map(([grade, count]) => `${grade}:${count}`).join(" ");
    }

    function renderRecordDetail(record) {
      detailTitle.textContent = `Record ${record.dataset_index ?? record.__recordIndex ?? ""}`;
      detailSubtitle.textContent = [record.source, record.subset, `target=${record.axiom_target_grade ?? "n/a"}`].filter(Boolean).join(" / ");
      detailBody.innerHTML = "";
      detailBody.append(
        kvBlock({
          source: record.source,
          subset: record.subset,
          dataset_index: record.dataset_index,
          axiom_target_grade: record.axiom_target_grade,
          correctness_label: record.correctness_label,
          overall_score: record.overall_score,
        }),
        detailsBlock("Problem", record.problem || record.question || ""),
        detailsBlock("Candidate Code", record.candidate_code || ""),
        detailsBlock("Tests", (record.tests || []).join("\n")),
      );
    }

    function renderNodeDetail(node) {
      const data = node.data || {};
      const rewardDetails = parseMaybeJson(data.reward_details);
      const finalPayload = parseReviewPayload(data.final_answer);
      detailTitle.textContent = `Node ${node.tag}`;
      detailSubtitle.textContent = `${data.target_dimension || "dimension n/a"} / q=${qLabel(data.q_value)} / visit=${data.visit_count ?? 0}`;
      detailBody.innerHTML = "";
      detailBody.append(
        kvBlock({
          tag: node.tag,
          q_value: data.q_value,
          value: data.value,
          prior: data.prior,
          visit_count: data.visit_count,
          axiom_grade: parsedGrade(node),
          target_grade: rewardDetails && rewardDetails.target_axiom_grade,
          predicted_grade: rewardDetails && rewardDetails.predicted_axiom_grade,
          reward_01: rewardDetails && rewardDetails.reward_01,
        }),
        detailsBlock("Node Text", data.text || ""),
        detailsBlock("Final Review", data.final_answer || ""),
        detailsBlock("Parsed Review JSON", finalPayload ? JSON.stringify(finalPayload, null, 2) : ""),
        detailsBlock("Reward Details", rewardDetails ? JSON.stringify(rewardDetails, null, 2) : ""),
      );
    }

    function kvBlock(values) {
      const block = document.createElement("div");
      block.className = "kv";
      Object.entries(values).forEach(([key, value]) => {
        const keyEl = document.createElement("div");
        keyEl.className = "key";
        keyEl.textContent = key;
        const valueEl = document.createElement("div");
        valueEl.className = "value";
        valueEl.textContent = value === undefined || value === null || value === "" ? "n/a" : String(value);
        block.append(keyEl, valueEl);
      });
      return block;
    }

    function detailsBlock(title, text) {
      const box = document.createElement("details");
      const summary = document.createElement("summary");
      const pre = document.createElement("pre");
      summary.textContent = title;
      pre.textContent = text || "(empty)";
      box.append(summary, pre);
      return box;
    }

    function parseMaybeJson(value) {
      if (!value || typeof value !== "string") return null;
      try { return JSON.parse(value); } catch { return null; }
    }

    function parseReviewPayload(value) {
      if (!value || typeof value !== "string") return null;
      let text = value.trim();
      text = text.replace(/^<review>\s*/i, "").replace(/\s*<\/review>$/i, "");
      const start = text.indexOf("{");
      const end = text.lastIndexOf("}");
      if (start >= 0 && end > start) text = text.slice(start, end + 1);
      try { return JSON.parse(text); } catch { return null; }
    }

    function parsedGrade(node) {
      const details = parseMaybeJson(node.data.reward_details);
      if (details && details.predicted_axiom_grade !== undefined) return details.predicted_axiom_grade;
      const payload = parseReviewPayload(node.data.final_answer);
      if (!payload) return null;
      if (payload.axiom_grade !== undefined) return payload.axiom_grade;
      if (payload.grade !== undefined) return payload.grade;
      return null;
    }

    function qLabel(value) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric.toFixed(2) : "n/a";
    }

    function shortTag(tag) {
      if (tag === "__root__") return "root";
      const parts = tag.split(".");
      return parts.length > 2 ? parts.slice(-2).join(".") : tag;
    }

    function colorForQ(value) {
      if (!Number.isFinite(value)) return "#b8c0bb";
      const t = clamp((value + 1) / 2, 0, 1);
      if (t < 0.5) return mixColor([180, 35, 24], [242, 201, 76], t / 0.5);
      return mixColor([242, 201, 76], [31, 143, 102], (t - 0.5) / 0.5);
    }

    function mixColor(a, b, t) {
      const c = a.map((value, index) => Math.round(value + (b[index] - value) * t));
      return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function fitView() {
      if (!flatNodes.length) return;
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 600;
      const maxX = Math.max(...flatNodes.map((node) => node.x)) + 140;
      const maxY = Math.max(...flatNodes.map((node) => node.y)) + 160;
      view.scale = clamp(Math.min(width / maxX, height / maxY), 0.35, 1.4);
      view.x = 40;
      view.y = 40;
      updateTransform();
    }

    function updateTransform() {
      const viewport = document.getElementById("viewport");
      if (viewport) viewport.setAttribute("transform", `translate(${view.x},${view.y}) scale(${view.scale})`);
    }

    function clientToSvg(clientX, clientY) {
      const rect = svg.getBoundingClientRect();
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
  </script>
</body>
