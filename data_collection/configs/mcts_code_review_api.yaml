mode: "mcts"
llm_backend: "openai_api"
model_dir: "deepseek-chat"
prompt_wrap: "review_sft"
result_unwrap: "review_sft"
temperature: 0.7
top_p: 0.95
max_tokens: 384
stop: ["</step>", "</step>\n", "</step>\n\n", "</review>"]
max_depth: 3
n_generate_sample: 3
iterations: 18
seed: 42
batch_size: 2
is_sampling: True
need_value_func: False
update_leaf_value: False
remove_duplicate: True
verbose: False
num_few_shot: 0
max_review_dimensions: 1
review_explore_depth: 2
review_max_exploration_nodes: 24
review_finalize_frontier_limit: 24
review_linear_rollout_rounds: 0
review_linear_rollout_samples: 1
review_target_leaf_count: 24
neutral_visit_reward: 0.0
positive_reward: 1.0
negative_reward: -1.0
disable_process_pool: True
api_base_url_env: "ZENMUX_BASE_URL"
api_key_env: "ZENMUX_API_KEY"
api_model_env: "ZENMUX_MODEL"
api_timeout: 120
api_max_retries: 3
api_retry_sleep: 2.0
api_prompt_suffix: "/no_think"
